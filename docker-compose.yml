version: '3.8'

services:
    # Laravel 应用
    app:
        build:
            context: ./docker/app
            dockerfile: Dockerfile
        container_name: eve-esi-app
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
            - ./storage:/var/www/html/storage
        networks:
            - eve-esi-network
        depends_on:
            - redis

    # Nginx Web 服务器
    nginx:
        image: nginx:alpine
        container_name: eve-esi-nginx
        restart: unless-stopped
        ports:
            - "80:80"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        networks:
            - eve-esi-network
        depends_on:
            - app

    # Redis 缓存
    redis:
        image: redis:alpine
        container_name: eve-esi-redis
        restart: unless-stopped
        networks:
            - eve-esi-network

networks:
    eve-esi-network:
        driver: bridge
